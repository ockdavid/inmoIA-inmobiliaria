<head>

  <title>Créditos fotográficos · InmoIA</title>
  <meta name="robots" content="noindex" />

  <style>
    .credits-page { max-width: 820px; margin-inline: auto; padding: calc(var(--header-h) + 3rem) clamp(1.1rem,4vw,2.4rem) 4rem; }
    .credits-page h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: .8rem; }
    .credits-page > p { color: var(--ink-mute); margin-bottom: 2rem; }
    .credits-list { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
    .credits-list li { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 1rem 1.2rem; font-size: .92rem; color: var(--ink-soft); }
    .credits-list a { color: var(--accent-deep); text-decoration: underline; }
    .back-link { display: inline-block; margin-bottom: 1.6rem; font-family: var(--font-display); font-weight: 600; color: var(--ink); }

<body>
  <main class="credits-page">
    <a class="back-link" href="index.html">← Volver a InmoIA</a>
    <h1>Créditos fotográficos</h1>
    <p>Imágenes bajo licencias Creative Commons / dominio público, obtenidas vía
       <a href="https://openverse.org" target="_blank" rel="noopener">Openverse</a>.
       Reemplázalas por tus propias fotos de inmuebles cuando las tengas.</p>
    <ul class="credits-list" data-credits>
      <li>Cargando créditos…</li>
    </ul>
  </main>
